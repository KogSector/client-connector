apiVersion: v1
kind: Service
metadata:
  name: client-connector
  namespace: confuse
  labels:
    app: client-connector
    service: mcp
spec:
  type: ClusterIP
  selector:
    app: client-connector
  ports:
  - name: http
    port: 3020
    targetPort: 3020
    protocol: TCP
  - name: mcp
    port: 8095
    targetPort: 8095
    protocol: TCP
