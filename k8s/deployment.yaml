apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-connector
  namespace: confuse
  labels:
    app: client-connector
    service: mcp
    version: v1.0.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: client-connector
  template:
    metadata:
      labels:
        app: client-connector
        service: mcp
        version: v1.0.0
    spec:
      containers:
      - name: client-connector
        image: confuseimgr.azurecr.io/client-connector:v1.0.0
        ports:
        - containerPort: 3020
          name: http
        - containerPort: 8095
          name: mcp
        env:
        # Service Configuration
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: client-connector-config
              key: PORT
        - name: HOST
          valueFrom:
            configMapKeyRef:
              name: client-connector-config
              key: HOST
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: client-connector-config
              key: ENVIRONMENT
        
        # MCP Configuration
        - name: MCP_SERVER_URL
          valueFrom:
            configMapKeyRef:
              name: client-connector-config
              key: MCP_SERVER_URL
        - name: MCP_SERVER_MODE
          valueFrom:
            configMapKeyRef:
              name: client-connector-config
              key: MCP_SERVER_MODE
        
        # Service Dependencies
        - name: AUTH_MIDDLEWARE_GRPC_ADDR
          valueFrom:
            configMapKeyRef:
              name: client-connector-config
              key: AUTH_MIDDLEWARE_GRPC_ADDR
        - name: FEATURE_TOGGLE_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: client-connector-config
              key: FEATURE_TOGGLE_SERVICE_URL
        - name: DATA_VENT_URL
          valueFrom:
            configMapKeyRef:
              name: client-connector-config
              key: DATA_VENT_URL
        
        # Database Configuration (NeonDB)
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: client-connector-config
              key: POSTGRES_HOST
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: client-connector-config
              key: POSTGRES_PORT
        - name: POSTGRES_DATABASE
          valueFrom:
            configMapKeyRef:
              name: client-connector-config
              key: POSTGRES_DATABASE
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: client-connector-config
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: client-connector-secrets
              key: POSTGRES_PASSWORD
        - name: POSTGRES_SSL
          valueFrom:
            configMapKeyRef:
              name: client-connector-config
              key: POSTGRES_SSL
        
        # CORS Configuration
        - name: CORS_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: client-connector-config
              key: CORS_ORIGINS
        
        # Logging
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: client-connector-config
              key: LOG_LEVEL
        
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        livenessProbe:
          httpGet:
            path: /health
            port: 3020
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /ready
            port: 3020
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        volumeMounts:
        - name: downloads
          mountPath: /app/downloads
      
      volumes:
      - name: downloads
        persistentVolumeClaim:
          claimName: confuse-downloads-pvc
      
      imagePullSecrets:
      - name: acr-secret
      
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
